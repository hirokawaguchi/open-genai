name: Python dependency audit

on:
  push:
    branches: [main]
    paths:
      - "**/requirements.txt"
      - "scripts/audit-python-deps.sh"
      - ".github/workflows/python-deps-audit.yml"
  pull_request:
    paths:
      - "**/requirements.txt"
      - "scripts/audit-python-deps.sh"
      - ".github/workflows/python-deps-audit.yml"
  workflow_dispatch:

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Scan Python requirements
        run: bash scripts/audit-python-deps.sh
