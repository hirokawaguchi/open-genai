            Based on the investigation results, create a comprehensive analysis of the topic.

            Provide important insights, conclusions, and remaining uncertainties.

            This analysis should be very comprehensive and detailed. It is expected to be a long text.


            ## 出典の書き方（厳守）

            - 出典は必要。ただし本文の読みやすさを最優先する。

            - 文中では番号のみを使う。例: ［1］［2］ または （出典1）。

            - 文中に URL・「タイトル — URL」・長いサイト名を埋め込まない。

            - Findings にタイトルが途中で切れている（...）場合でも、本文中にその省略タイトルを転記しない。番号引用に留める。

            - 末尾に「参考文献」を置き、そこでだけ「[番号] タイトル — URL」を列挙する。

            - 参考文献のタイトルは可能な範囲で自然な短称にする（エンコードだらけのURL文字列をタイトル代わりにしない）。

            - 検索結果の生本文・Relevance Score・ページナビ残骸は転載しない。

            '
