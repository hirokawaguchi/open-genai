    - data:
        code: "import json\nimport re\n\ndef main(text: str) -> dict:\n    raw = text or \"\"\n    # ```json ... ``` を優先抽出\n\
          \    m = re.search(r\"```(?:json)?\\s*([\\s\\S]*?)```\", raw, re.I)\n    candidate = (m.group(1) if m else raw).strip()\n\
          \    # 最初の { ... } を抽出\n    brace = re.search(r\"\\{[\\s\\S]*\\}\", candidate)\n    if brace:\n        candidate\
          \ = brace.group(0)\n\n    def try_load(s: str):\n        return json.loads(s)\n\n    data = None\n    err = \"\"\
          \n    for s in (candidate, candidate.replace(\"\\r\\n\", \"\\n\")):\n        try:\n            data = try_load(s)\n\
          \            break\n        except Exception as e1:\n            err = str(e1)\n            # 文字列値内の素の制御文字をエスケープして再試行\n\
          \            fixed = []\n            in_str = False\n            esc = False\n            for ch in s:\n       \
          \         if esc:\n                    fixed.append(ch)\n                    esc = False\n                    continue\n\
          \                if ch == \"\\\\\":\n                    fixed.append(ch)\n                    esc = True\n    \
          \                continue\n                if ch == '\"':\n                    in_str = not in_str\n           \
          \         fixed.append(ch)\n                    continue\n                if in_str and ord(ch) < 32:\n        \
          \            fixed.append(\"\\\\u%04x\" % ord(ch))\n                    continue\n                fixed.append(ch)\n\
          \            try:\n                data = try_load(\"\".join(fixed))\n                break\n            except\
          \ Exception as e2:\n                err = str(e2)\n\n    if not isinstance(data, dict):\n        return {\n    \
          \        \"nextSearchTopic\": \"\",\n            \"shouldContinue\": \"false\",\n            \"parse_ok\": \"false\"\
          ,\n            \"parse_error\": err or \"json parse failed\",\n        }\n\n    topic = data.get(\"nextSearchTopic\"\
          )\n    if topic is None:\n        topic = \"\"\n    topic = str(topic).strip()\n    if topic.lower() in (\"none\"\
          , \"null\"):\n        topic = \"\"\n\n    cont = data.get(\"shouldContinue\", False)\n    if isinstance(cont, str):\n\
          \        cont_s = \"true\" if cont.strip().lower() in (\"true\", \"1\", \"yes\") else \"false\"\n    else:\n   \
          \     cont_s = \"true\" if bool(cont) else \"false\"\n\n    # トピックが空なら継続しない\n    if cont_s == \"true\" and not topic:\n\
          \        cont_s = \"false\"\n\n    return {\n        \"nextSearchTopic\": topic,\n        \"shouldContinue\": cont_s,\n\
          \        \"parse_ok\": \"true\",\n        \"parse_error\": \"\",\n    }\n"
        code_language: python3
        desc: Planner JSON を制御文字に耐えて抽出する
