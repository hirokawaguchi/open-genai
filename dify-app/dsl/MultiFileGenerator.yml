    複数ドキュメントと指示から新規ファイルを生成するワークフロー。
    必要に応じて Tavily で Web 検索し、markdown / text / json / docx / pptx で出力する。
    依存: File Tools, Markdown Exporter, Tavily, Azure OpenAI。Tavily は認証（APIキー）設定が必要。
