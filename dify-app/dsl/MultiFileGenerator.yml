    - data:
        context:
          enabled: false
          variable_selector: []
        desc: 指示と参照（＋必要なら検索結果）から本文を生成
        model:
          completion_params:
            temperature: 0.3
          mode: chat
          name: gpt-4.1
          provider: langgenius/azure_openai/azure_openai
        prompt_template:
        - id: mfg-gen-sys
          role: system
          text: |
            あなたは複数の参照資料を読み、ユーザー指示に従って新しいファイル本文を作成するアシスタントです。

            ## 共通ルール
            - 前置き・後書き・説明文は書かない（本文のみ）
            - 参照資料や検索結果にない事実を捏造しない。不足は「要確認」と明記
            - コードフェンスで全体を囲まない

            ## 出力形式別ルール
            - markdown / docx: 見出し・箇条書きを使った Markdown
            - text: プレーンテキスト
            - json: 有効な JSON のみ
            - pptx: Pandoc スライド形式。各スライドを --- で区切る。1枚目はタイトル、以降は箇条書き中心。1スライドあたり要点は多くしすぎない
        - id: mfg-gen-user
          role: user
          text: |
            ## 出力形式

            {{#1750000000003.output_format#}}

            ## 指示

            {{#1750000000003.prompt#}}

            ## 参照資料（検索結果があれば含む）

            {{#1750000000010.output#}}
        selected: false
        title: ファイル生成 LLM
        type: llm
        variables: []
        vision:
          enabled: false
      height: 90
      id: '1750000000011'
      position:
