      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        code: |
          def main(text: str, filename: str, output_format: str) -> dict:
              content = (text or "").strip()
              if content.startswith("```"):
                  lines = content.split("\n")
                  if lines and lines[0].startswith("```"):
                      lines = lines[1:]
                  if lines and lines[-1].strip() == "```":
                      lines = lines[:-1]
                  content = "\n".join(lines).strip()

              fmt = (output_format or "markdown").strip().lower() or "markdown"
              ext_map = {
                  "markdown": ".md",
                  "text": ".txt",
                  "json": ".json",
                  "docx": ".docx",
                  "pptx": ".pptx",
              }
              mime_map = {
                  "markdown": "text/markdown",
                  "text": "text/plain",
                  "json": "application/json",
                  "docx": "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
                  "pptx": "application/vnd.openxmlformats-officedocument.presentationml.presentation",
              }
              ext = ext_map.get(fmt, ".md")
              mime = mime_map.get(fmt, "text/markdown")

              name = (filename or "generated").strip() or "generated"
              if "." in name:
                  stem = name.rsplit(".", 1)[0] or "generated"
              else:
                  stem = name
              full_name = stem + ext
              return {
                  "content": content,
                  "filename": full_name,
                  "filename_stem": stem,
                  "mime_type": mime,
                  "output_format": fmt,
              }
        code_language: python3
        desc: 本文整形とファイル名・形式の確定
        outputs:
          content:
            children: null
            type: string
          filename:
            children: null
            type: string
          filename_stem:
            children: null
            type: string
          mime_type:
            children: null
            type: string
          output_format:
            children: null
