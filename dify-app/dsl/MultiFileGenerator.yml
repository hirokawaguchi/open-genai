    - data:
        code: |
          import json
          import re

          def main(text: str) -> dict:
              s = (text or "").strip()
              if s.startswith("```"):
                  lines = s.split("\n")
                  if lines and lines[0].startswith("```"):
                      lines = lines[1:]
                  if lines and lines[-1].strip() == "```":
                      lines = lines[:-1]
                  s = "\n".join(lines).strip()
              need = "false"
              query = ""
              try:
                  m = re.search(r"\{[\s\S]*\}", s)
                  obj = json.loads(m.group(0) if m else s)
                  raw = obj.get("need_search")
                  need = "true" if raw in (True, "true", "True", 1, "1") else "false"
                  q = obj.get("search_query")
                  query = "" if q is None else str(q).strip()
              except Exception:
                  need = "false"
                  query = ""
              if need == "true" and not query:
                  need = "false"
              return {"need_search": need, "search_query": query}
        code_language: python3
        desc: 判定JSONをパースする
        outputs:
          need_search:
            children: null
            type: string
          search_query:
            children: null
            type: string
        selected: false
        title: 判定パース
