    - data:
        code: |
          def main(texts, prompt: str, output_filename: str, output_format: str) -> dict:
              if texts is None:
                  texts = []
              if isinstance(texts, str):
                  texts = [texts]
              parts = []
              for i, t in enumerate(texts):
                  body = (t or "").strip()
                  parts.append(f"### ファイル {i + 1}\n\n{body if body else '(空のファイル)'}")
              context = "\n\n---\n\n".join(parts) if parts else "(入力ファイルなし)"
              fmt = (output_format or "markdown").strip().lower() or "markdown"
              if fmt not in ("markdown", "text", "json", "docx", "pptx"):
                  fmt = "markdown"
              name = (output_filename or "").strip() or "generated"
              return {
                  "context": context,
                  "prompt": (prompt or "").strip(),
                  "filename": name,
                  "output_format": fmt,
                  "file_count": len(texts),
              }
        code_language: python3
        desc: 抽出テキストを結合し、出力メタ情報を整える
