# Open GENAI 検証/ローカル用リバースプロキシ（HTTP のみ・TLS 不要）。
#
# 閉域検証など自己署名証明書を使えない環境向け。ポート 80 のみで公開し、
# web / backend / keycloak を同一オリジン配下にパスで集約する。
#   /      -> web (Vite)          ブラウザの SPA
#   /api/  -> backend:8000 (prefix 除去)  API・SAML SP・ファイル配信
#   /kc/   -> keycloak:8080 (relative /kc) SAML IdP
#
# 本番 TLS 終端は proxy/nginx.conf（docker-compose.prod.yml）を使用する。

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;

    client_max_body_size 64m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        resolver 127.0.0.11 valid=30s ipv6=off;

        location /api/ {
            set $backend_upstream http://backend:8000;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Prefix /api;
            proxy_buffering    off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Keycloak が /kc 無しの SAML URL を返した場合の救済
        location /realms/ {
            return 302 $scheme://$host/kc$request_uri;
        }

        location /kc/ {
            set $kc_upstream http://keycloak:8080;
            proxy_pass $kc_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  $server_port;
            proxy_set_header X-Forwarded-Prefix /kc;
        }

        location / {
            set $web_upstream http://web:5173;
            proxy_pass $web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
