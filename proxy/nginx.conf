# Open GENAI 本番用リバースプロキシ（TLS を一元終端）。
#
# LGWAN ではユーザ側に通せるのは 80/443 のみ。本プロキシだけが 80/443 を公開し、
# web / backend / keycloak は同一オリジン配下にパスでマッピングして集約する。
#   /      -> web (Vite)          ブラウザの SPA
#   /api/  -> backend:8000 (prefix 除去)  API・SAML SP・ファイル配信
#   /kc/   -> keycloak:8080 (relative /kc) SAML IdP
#
# 証明書は /etc/nginx/certs/{fullchain.pem,privkey.pem} をマウントする
# （閉域検証用の自己署名は proxy/certs/generate-selfsigned.sh で生成可能）。

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;

    # 添付ファイルのアップロード上限（必要に応じて調整）
    client_max_body_size 64m;

    # WebSocket(Upgrade) 用（Vite HMR 等）
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # --- HTTP(80) は HTTPS(443) へ強制リダイレクト ---
    server {
        listen 80;
        listen [::]:80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # --- HTTPS(443): TLS 終端 & パスルーティング ---
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # セキュリティヘッダ（必要に応じて調整）
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;

        # Docker 内蔵 DNS。上流の名前解決をリクエスト時に遅延させ、
        # 起動順の前後で proxy が落ちないようにする（未起動時は 502 を返す）。
        resolver 127.0.0.11 valid=30s ipv6=off;

        # --- backend API（/api を除去して backend ルートへ）---
        location /api/ {
            set $backend_upstream http://backend:8000;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host  $host;
            # 推論ストリーム(SSE/NDJSON)のためバッファ無効・長時間タイムアウト
            proxy_buffering    off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # --- Keycloak（relative path /kc をそのまま維持）---
        location /kc/ {
            set $kc_upstream http://keycloak:8080;
            proxy_pass $kc_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  443;
        }

        # --- フロントエンド（Vite dev server / HMR WebSocket 対応）---
        location / {
            set $web_upstream http://web:5173;
            proxy_pass $web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
